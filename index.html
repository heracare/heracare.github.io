<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        @font-face {
            font-family: 'Perandory-Regular';
            src: url('Perandory-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Perandory-Condensed';
            src: url('Perandory-Condensed.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --color-bg: #891018;
            --color-panel: #FBAA1A;
            --color-available: #4AAF50;
            --color-selected: #f2cd26;
            --color-occupied: #C82729;
            --color-text: #ffffff;
            --color-stage: #B6433E;
            --color-control-panel: #d06f4c;
        }

        .film-strip {
            position: fixed;
            top: 0;
            width: 80px;
            height: 100vh;
            background-image: url('filmstrip.svg');
            background-repeat: repeat-y;
            background-size: 80px auto;
            z-index: 2;
            animation: scroll-vertical 10s linear infinite;
        }

        .strip-left {
            left: 0;
        }

        .strip-right {
            right: 0;
        }

        @keyframes scroll-vertical {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 0 100vh;
            }
        }

        html,
        body {
            overflow: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 48px;
            letter-spacing: 1px;
            text-align: center;
            color: var(--color-panel);
            font-family: 'Perandory-Regular', sans-serif;
        }

        .subtitle {
            color: var(--color-text);
            font-size: 15px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            font-family: 'Perandory-Condensed', sans-serif;
        }

        .legend {
            display: flex;
            gap: 20px;
            background: var(--color-control-panel);
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .theater-stage-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            position: relative;
            padding: 0 100px;
        }

        .stage-area-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            margin-bottom: 50px;
        }

        .entrance {
            position: absolute;
            left: 0;
            width: 80px;
            height: 40px;
            border: 2px dashed var(--color-available);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--color-available);
            font-weight: bold;
            border-radius: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .stage {
            width: 100%;
            max-width: 400px;
            height: 25px;
            background: var(--color-panel);
            border-radius: 4px;
            box-shadow: 0 8px 25px rgba(236, 172, 142, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-text {
            font-size: 12px;
            color: var(--color-text);
            font-weight: bold;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .theater-container {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px 30px;
            background: #ffffff;
            border-radius: 10px;
        }

        .block {
            display: grid;
            gap: 10px;
        }

        .row-labels {
            display: grid;
            gap: 10px;
            color: #555;
            font-weight: bold;
            margin-top: 5px;
        }

        .row-label {
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .seat {
            width: 35px;
            height: 35px;
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .seat.available {
            background-color: var(--color-available);
        }

        .seat.available:hover {
            transform: scale(1.1);
            box-shadow: 0 0 8px var(--color-available);
        }

        .seat.selected {
            background-color: var(--color-selected);
            color: #fff;
        }

        .seat.occupied {
            background-color: var(--color-occupied);
            color: #fff;
        }

        .seat.occupied:hover {
            transform: scale(1.1);
            box-shadow: 0 0 8px var(--color-occupied);
        }

        .marquee-container {
            width: 100%;
            margin-top: 35px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 5px;
            white-space: nowrap;
            z-index: 1;
        }

        .marquee-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
            font-family: 'Perandory-Regular', sans-serif;
            font-size: 50px;
            color: var(--color-panel);
            letter-spacing: 5px;
        }

        @keyframes marquee {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(-100%, 0);
            }
        }

        .bottom-control-area {
            display: grid;
            grid-template-columns: 160px 1fr 160px;
            align-items: flex-end;
            width: 100%;
            max-width: 900px;
            margin-top: 50px;
            gap: 20px;
        }

        .bottom-spacer {
            width: 100%;
        }

        .action-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            background: var(--color-stage);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .stats {
            font-size: 15px;
            text-align: center;
            line-height: 1.6;
        }

        .stats span {
            font-weight: bold;
            color: var(--color-selected);
        }

        .btn-container {
            display: flex;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-confirm {
            background-color: var(--color-available);
            color: white;
        }

        .btn-confirm:hover {
            background-color: var(--color-bg);
        }

        .btn-reset {
            background-color: var(--color-occupied);
            color: white;
            white-space: nowrap;
        }

        .btn-reset:hover {
            background-color: #8a332e;
        }

        .swal2-popup {
            background: #2a2a35 !important;
            color: #ffffff !important;
        }

        .swal2-title,
        .swal2-html-container {
            color: #ffffff !important;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 25px;
            z-index: 3;
        }

        .header-text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .header-text-group h1 {
            margin-bottom: 0;
            text-align: left;
        }

        .header-text-group .subtitle {
            margin-bottom: 0;
            text-align: left;
        }

        .theater-logo {
            height: 100px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
            animation: theater-logo-anim 6s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .theater-logo:hover {
            transform: scale(1.08);
        }

        @keyframes theater-logo-anim {
            0% {
                transform: translateY(0) rotate(0deg);
                filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 5px rgba(251, 170, 26, 0.3));
            }

            25% {
                transform: translateY(-5px) rotate(1deg);
                filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4)) drop-shadow(0 0 12px rgba(251, 170, 26, 0.6));
            }

            50% {
                transform: translateY(-8px) rotate(-1deg);
                filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3)) drop-shadow(0 0 20px rgba(251, 170, 26, 0.8));
            }

            75% {
                transform: translateY(-4px) rotate(1deg);
                filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4)) drop-shadow(0 0 12px rgba(251, 170, 26, 0.6));
            }

            100% {
                transform: translateY(0) rotate(0deg);
                filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 5px rgba(251, 170, 26, 0.3));
            }
        }
    </style>
</head>

<body>

    <div class="film-strip strip-left"></div>
    <div class="film-strip strip-right"></div>

    <header class="header-container">
        <img src="logo-theater.png" alt="Trilogi Theater Logo" class="theater-logo">
        <div class="header-text-group">
            <h1>MALIN KUNDANG</h1>
            <div class="subtitle">Performed by Group 1</div>
        </div>
    </header>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-box" style="background-color: var(--color-available);"></div>
            <span>Available</span>
        </div>
        <div class="legend-item">
            <div class="legend-box" style="background-color: var(--color-selected);"></div>
            <span>Selected</span>
        </div>
        <div class="legend-item">
            <div class="legend-box" style="background-color: var(--color-occupied);"></div>
            <span>Occupied</span>
        </div>
    </div>

    <div class="theater-stage-wrapper">
        <div class="stage-area-container">
            <div class="entrance">
                <span>MAIN</span>
                <span>ENTRANCE</span>
            </div>

            <div class="stage">
                <div class="stage-text">MAIN STAGE</div>
            </div>
        </div>

        <div class="theater-container">
            <div class="block" id="block-left" style="grid-template-columns: repeat(6, 1fr);"></div>
            <div class="row-labels" id="row-labels"></div>
            <div class="block" id="block-right" style="grid-template-columns: repeat(6, 1fr);"></div>
        </div>
    </div>

    <div class="marquee-container">
        <div class="marquee-text">WELCOME TO TRILOGI THEATER BY GROUP 1 - ENJOY THE SHOW!</div>
    </div>

    <div class="bottom-control-area">
        <div class="bottom-spacer"></div>

        <div class="action-panel">
            <div class="stats">
                Currently selected seats: <span id="selected-count">0</span><br>
                Total occupied seats (Red): <span id="occupied-count">0</span> / 99
            </div>
            <div class="btn-container">
                <button class="btn btn-confirm" id="confirm-btn">Confirm Order</button>
            </div>
        </div>

        <button class="btn btn-reset" id="reset-btn">Reset All Seats</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcCQ4tvGlKN2_GDWtG4P_EYlnSpFQwukM",
            authDomain: "theatertrilogi-643d2.firebaseapp.com",
            databaseURL: "https://theatertrilogi-643d2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "theatertrilogi-643d2",
            storageBucket: "theatertrilogi-643d2.firebasestorage.app",
            messagingSenderId: "419268678381",
            appId: "1:419268678381:web:4a6f0f1c8354542aa4b2e4",
            measurementId: "G-TR7020FWNJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const seatsRef = ref(db, 'theaterSeats');

        const rows = 9;
        const rowLabels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];

        const blockLeftContainer = document.getElementById('block-left');
        const blockRightContainer = document.getElementById('block-right');
        const rowLabelsContainer = document.getElementById('row-labels');
        const selectedCountEl = document.getElementById('selected-count');
        const occupiedCountEl = document.getElementById('occupied-count');
        const confirmBtn = document.getElementById('confirm-btn');
        const resetBtn = document.getElementById('reset-btn');

        let seatData = {};

        function renderTheater() {
            blockLeftContainer.innerHTML = '';
            blockRightContainer.innerHTML = '';
            rowLabelsContainer.innerHTML = '';

            for (let r = rows - 1; r >= 0; r--) {
                if (r === 7 || r === 8) continue;

                const rowName = rowLabels[r];

                const labelEl = document.createElement('div');
                labelEl.classList.add('row-label');
                labelEl.innerText = rowName;
                rowLabelsContainer.appendChild(labelEl);

                // Left Block: 6 seats (1 to 6)
                for (let c = 1; c <= 6; c++) {
                    const seatId = `${rowName}${c}`;
                    blockLeftContainer.appendChild(createSeatElement(seatId));
                }

                // Right Block: 6 seats (7 to 12)
                for (let c = 7; c <= 12; c++) {
                    const seatId = `${rowName}${c}`;
                    blockRightContainer.appendChild(createSeatElement(seatId));
                }
            }
            updateStats();
        }

        function createSeatElement(seatId) {
            const seat = document.createElement('div');
            seat.classList.add('seat');
            seat.innerText = seatId;
            seat.dataset.id = seatId;

            if (seatData[seatId] === 'occupied') {
                seat.classList.add('occupied');
            } else if (seatData[seatId] === 'selected') {
                seat.classList.add('selected');
            } else {
                seat.classList.add('available');
            }

            seat.addEventListener('click', () => {
                if (seat.classList.contains('occupied')) {
                    Swal.fire({
                        title: 'Cancel Reservation?',
                        text: `Do you want to cancel the reservation for seat ${seatId}?`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#b6433e',
                        cancelButtonColor: '#66746c',
                        confirmButtonText: 'Yes, cancel it!'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            remove(ref(db, `theaterSeats/${seatId}`));
                        }
                    });
                }
                else if (seat.classList.contains('selected')) {
                    remove(ref(db, `theaterSeats/${seatId}`));
                }
                else {
                    set(ref(db, `theaterSeats/${seatId}`), 'selected');
                }
            });

            return seat;
        }

        function updateStats() {
            const selectedSeats = document.querySelectorAll('.seat.selected');
            const documentOccupied = document.querySelectorAll('.seat.occupied');

            selectedCountEl.innerText = selectedSeats.length;
            occupiedCountEl.innerText = documentOccupied.length;
        }

        confirmBtn.addEventListener('click', () => {
            const selectedKeys = Object.keys(seatData).filter(key => seatData[key] === 'selected');

            if (selectedKeys.length === 0) {
                Swal.fire({ title: 'No Seats Selected', text: 'Please click and select available seats first!', icon: 'info' });
                return;
            }

            Swal.fire({
                title: 'Confirm Order',
                text: `Are you sure you want to book these ${selectedKeys.length} seats?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4AAF50',
                cancelButtonColor: '#C82729',
                confirmButtonText: 'Yes, Confirm!'
            }).then((result) => {
                if (result.isConfirmed) {
                    const updates = {};
                    selectedKeys.forEach(id => { updates[id] = 'occupied'; });
                    update(seatsRef, updates);
                }
            });
        });

        resetBtn.addEventListener('click', () => {
            Swal.fire({
                title: 'Are you sure?',
                text: "This will reset all seats!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#b6433e',
                confirmButtonText: 'Yes, reset all!'
            }).then((result) => {
                if (result.isConfirmed) { remove(seatsRef); }
            });
        });

        onValue(seatsRef, (snapshot) => {
            const data = snapshot.val();
            seatData = data || {};
            renderTheater();
        });
    </script>
</body>

</html>
